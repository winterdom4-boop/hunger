<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sims 2 Hunger Bar Timer</title>
    <link rel="stylesheet" href="https://cdnfonts.com">
    <link rel="stylesheet" href="style.css">
</head>
<body id="app-body">

    <!-- The Sims 2 Needs Panel Interface -->
    <div id="ui-panel" class="needs-panel">
        
        <!-- Enhanced Real 3D Plumbob Diamond Structure -->
        <div class="plumbob-container">
            <div id="plumbob" class="plumbob-diamond spinning paused">
                <!-- Front Facets -->
                <div class="top-left face-front"></div>
                <div class="top-right face-front"></div>
                <div class="bottom-left face-front"></div>
                <div class="bottom-right face-front"></div>
                <!-- Back Facets (Provides the thickness at 90 degrees) -->
                <div class="top-left face-back"></div>
                <div class="top-right face-back"></div>
                <div class="bottom-left face-back"></div>
                <div class="bottom-right face-back"></div>
            </div>
        </div>

        <div class="need-row">
            <span class="need-label">Hunger</span>
            <div class="bar-container">
                <div id="hunger-bar" class="bar-fill"></div>
            </div>
        </div>

        <div class="control-panel">
            <button id="play-pause-btn" onclick="toggleTimer()">Play</button>
            <button id="fed-btn" onclick="feedSim()">Fed</button>
            <button id="mute-btn" onclick="toggleMute()">Mute</button>
        </div>
    </div>

    <!-- Hidden Game Over Screen -->
    <div id="frenzied-feast-screen" class="hidden">
        <h1 class="feast-text">Frenzied Feast</h1>
    </div>

    <!-- Hidden Test Button Area -->
    <button id="secret-test-btn" onclick="triggerSecretTest()"><span>Test</span></button>

    <audio id="alarm-sound" src="alarm.wav" preload="auto" loop></audio>

</body>
<script src="script.js"></script>
</html>
