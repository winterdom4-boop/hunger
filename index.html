<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sims 2 Hunger Bar Timer</title>
    <link rel="stylesheet" href="https://cdnfonts.com">
    <link rel="stylesheet" href="style.css">
</head>
<body id="app-body">

    <!-- The Sims 2 Needs Panel Interface -->
    <div id="ui-panel" class="needs-panel">
        
        <!-- Original Flat 2D Spinning Plumbob -->
        <div class="plumbob-container">
            <div id="plumbob-diamond" class="plumbob-diamond spinning paused"></div>
        </div>

        <!-- Dynamic Game Over Announcement Container -->
        <div id="frenzied-feast-screen" class="hidden">
            <h1 class="feast-text">crave<br>rage</h1>
        </div>

        <div class="need-row">
            <span id="hunger-label" class="need-label">Hunger</span>
            <div class="bar-container">
                <div id="hunger-bar" class="bar-fill"></div>
            </div>
        </div>

        <div class="control-panel">
            <button id="play-pause-btn" onclick="toggleTimer()">Play</button>
            <button id="fed-btn" onclick="feedSim()">Fed</button>
            <button id="mute-btn" onclick="toggleMute()">Mute</button>
        </div>
    </div>

    <!-- Hidden Test Button Area -->
    <button id="secret-test-btn" onclick="triggerSecretTest()"><span>Test</span></button>

    <audio id="alarm-sound" src="alarm.wav" preload="auto"></audio>

</body>
<script src="script.js"></script>
</html>
